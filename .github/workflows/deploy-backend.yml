name: Deploy Backend (EC2)

# main에 백엔드/인프라 변경이 푸시되면 EC2에 SSH로 배포.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - "docker-compose.prod.yml"
      - "monitoring/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch: {} # 수동 실행 버튼

# ④ 연달아 머지해도 배포는 하나씩 (같은 폴더 동시 빌드 방지). 진행 중 배포는 끝까지.
concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH로 EC2 배포
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m # ② 기본 10분 초과 시 액션만 끝나고 EC2는 계속 빌드하는 혼란 방지
          script: |
            set -e
            cd ~/skillcanvas
            git fetch origin
            git reset --hard origin/main   # ⑤ 워킹트리 상태 무관하게 main과 강제 일치
            export COMPOSE_PROJECT_NAME=skillcanvas
            C="docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile full --profile monitoring"
            $C up -d --build
            # ⑥ monitoring/ 설정은 전부 바인드 마운트라 git reset --hard로 파일은 갱신되지만, 프로세스가
            #    설정을 다시 읽지 않고 up -d도 compose 정의가 바뀐 서비스만 재생성하므로 컨테이너가 옛 설정
            #    그대로 살아남는다 → 배포는 초록불인데 반영만 안 되는 사일런트 실패. 해당 4개를 명시적 재시작.
            #      prometheus.yml / loki-config.yml / promtail-config.yml / grafana provisioning
            #    - promtail은 -server.enable-runtime-reload가 없어 SIGHUP 리로드도 불가 → 재시작이 유일한 수단
            #    - grafana 대시보드 JSON은 updateIntervalSeconds:30으로 자동 반영되지만 datasource는 기동 시에만 읽음
            #    데이터는 모두 명명 볼륨(prometheus-data 등)에 있어 재시작해도 보존된다.
            #
            # ⑦ ⑥이 만든 새 실패 모드 차단. prometheus.yml에 문법 오류가 들어오면 예전엔 옛 설정으로
            #    계속 살아있었지만, 이제 재시작하므로 크래시 루프에 빠진다. 그런데 restart는 이후
            #    컨테이너가 죽어도 exit 0이고 아래 헬스체크는 backend만 보므로 배포는 초록불이 된다.
            #    → 재시작 전에 검증해 set -e로 배포를 세운다(같은 바인드 마운트를 그대로 물고 검사).
            $C run --rm --no-deps --entrypoint promtool prometheus check config /etc/prometheus/prometheus.yml
            $C restart prometheus promtail loki grafana
            $C exec -T backend alembic upgrade head
            $C exec -T backend python -m app.seed_tools
            # ① HTTP 200 + db_connected:true 둘 다 확인 (200만으론 DB 죽어도 통과)
            curl -sf http://localhost:8000/api/v1/health | grep -q '"db_connected":true'
