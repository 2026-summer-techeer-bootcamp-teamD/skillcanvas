name: Deploy Backend (EC2)

# main에 백엔드/인프라 변경이 푸시되면 EC2에 SSH로 배포.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - "docker-compose.prod.yml"
      - "monitoring/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch: {} # 수동 실행 버튼

# ④ 연달아 머지해도 배포는 하나씩 (같은 폴더 동시 빌드 방지). 진행 중 배포는 끝까지.
concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH로 EC2 배포
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m # ② 기본 10분 초과 시 액션만 끝나고 EC2는 계속 빌드하는 혼란 방지
          script: |
            set -e
            cd ~/skillcanvas
            git fetch origin
            git reset --hard origin/main   # ⑤ 워킹트리 상태 무관하게 main과 강제 일치
            export COMPOSE_PROJECT_NAME=skillcanvas
            C="docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile full --profile monitoring"
            $C up -d --build
            # ⑥ prometheus.yml은 바인드 마운트라 파일은 갱신되지만 Prometheus가 다시 읽지 않고,
            #    up -d는 compose 정의가 바뀐 서비스만 재생성하므로 prometheus 컨테이너는 살아남는다.
            #    → 스크랩 잡을 추가해도 반영이 안 되므로 명시적으로 재시작(데이터는 prometheus-data 볼륨에 보존).
            $C restart prometheus
            $C exec -T backend alembic upgrade head
            $C exec -T backend python -m app.seed_tools
            # ① HTTP 200 + db_connected:true 둘 다 확인 (200만으론 DB 죽어도 통과)
            curl -sf http://localhost:8000/api/v1/health | grep -q '"db_connected":true'
