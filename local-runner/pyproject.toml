[tool.black]
line-length = 100
target-version = ["py312"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]  # 줄 길이는 black이 관리

[tool.pytest.ini_options]
# local-runner 폴더에서 pytest 실행 시 app 패키지를 import 경로에 추가
pythonpath = ["."]
testpaths = ["tests"]
