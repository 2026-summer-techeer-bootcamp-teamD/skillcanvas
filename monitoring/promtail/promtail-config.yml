server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  # named volume(promtail-positions)에 저장 -> 컨테이너 재생성돼도 읽기 위치를 잃지 않음
  filename: /data/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker Desktop이 뜬 컨테이너를 자동 발견해서 로그 파일을 tail한다.
  # (docker_sd는 Docker API로 컨테이너 목록을 얻고, 실제 로그는 /var/lib/docker/containers 마운트에서 읽음)
  # - docker.sock을 직접 물지 않고 조회 전용 docker-socket-proxy를 거친다 (전체 Docker API 권한 방지).
  # - filters로 이 compose 프로젝트(skillcanvas) 소속 컨테이너만 대상으로 좁힌다.
  #   (같은 호스트의 다른 프로젝트 컨테이너 로그가 섞여 들어가는 것 방지)
  - job_name: docker
    docker_sd_configs:
      - host: tcp://docker-socket-proxy:2375
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=skillcanvas"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: "stream"
    pipeline_stages:
      # 백엔드는 JSON 한 줄 로그(logging_config.py)라 handler/status/fail_code를 라벨로 뽑아낼 수 있음.
      # 다른 컨테이너(postgres/grafana 등)는 JSON이 아니라서 원본 라인 그대로 둔다.
      - match:
          selector: '{container="skillcanvas-backend"}'
          stages:
            - json:
                expressions:
                  level: level
                  handler: handler
                  status: status
                  fail_code: fail_code
            - labels:
                level:
                handler:
                status:
